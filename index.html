<!DOCTYPE html>
<html class="staticrypt-html" lang="ja">
    <head>
        <meta charset="utf-8" />
        <title>デモ閲覧 - パスワードを入力してください</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet" />

        <style>
            :root {
                --red: #d9363e;
                --red-dark: #b92b32;
                --brown: #3b2a25;
                --cream: #fff8f0;
                --muted: #8a7468;
                --border: #f0d8cf;
            }
            .staticrypt-html,
            .staticrypt-body {
                height: 100%;
            }
            .staticrypt-body {
                margin: 0;
            }
            .staticrypt-content {
                height: 100%;
                margin: 0;
                font-family: "M PLUS Rounded 1c", "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
                color: var(--brown);
                background: linear-gradient(160deg, #fff6ee 0%, #fdeee6 55%, #fbe3dd 100%);
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            /* ローディング */
            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #fff6ee;
            }
            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 0.25em solid var(--border);
                border-right-color: transparent;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }
            @keyframes spinner-border {
                100% {
                    transform: rotate(360deg);
                }
            }

            /* レイアウト */
            .gate {
                min-height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
                box-sizing: border-box;
            }
            .staticrypt-form {
                width: 100%;
                max-width: 420px;
                background: #ffffff;
                border-radius: 24px;
                padding: 44px 40px 34px;
                text-align: center;
                box-shadow: 0 18px 50px rgba(120, 60, 40, 0.16);
                box-sizing: border-box;
            }
            .gate-logo {
                display: block;
                height: 66px;
                width: auto;
                margin: 0 auto 18px;
            }
            .staticrypt-instructions {
                margin-bottom: 4px;
            }
            .staticrypt-title {
                font-size: 1.16rem;
                font-weight: 800;
                letter-spacing: 0.06em;
                color: var(--brown);
                margin: 0 0 10px;
            }
            .staticrypt-instructions p:last-child {
                font-size: 0.84rem;
                color: var(--muted);
                line-height: 1.85;
                margin: 0;
            }
            .staticrypt-hr {
                border: 0;
                border-top: 1px dashed var(--border);
                margin: 22px 0;
            }

            /* 入力欄 */
            .staticrypt-password-container {
                position: relative;
                background: var(--cream);
                border: 1.5px solid var(--border);
                border-radius: 12px;
                margin: 0 0 16px;
                box-sizing: border-box;
                transition: border-color 0.15s ease;
            }
            .staticrypt-password-container:focus-within {
                border-color: var(--red);
            }
            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                outline: 0;
                box-sizing: border-box;
                width: 100%;
                font-size: 16px;
                font-family: inherit;
                color: var(--brown);
                padding: 15px 46px 15px 16px;
            }
            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 20px;
                width: 20px;
                opacity: 0.5;
                padding: 13px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
            }

            /* ボタン */
            .staticrypt-decrypt-button {
                width: 100%;
                border: 0;
                border-radius: 999px;
                padding: 15px;
                cursor: pointer;
                background: var(--red);
                color: #ffffff;
                font-size: 1rem;
                font-weight: 700;
                letter-spacing: 0.06em;
                font-family: inherit;
                box-shadow: 0 8px 18px rgba(217, 54, 62, 0.28);
                transition: background 0.15s ease, transform 0.15s ease;
            }
            .staticrypt-decrypt-button:hover,
            .staticrypt-decrypt-button:focus {
                background: var(--red-dark);
                transform: translateY(-1px);
            }

            /* Remember me */
            label.staticrypt-remember {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                margin: 14px 0 0;
                font-size: 0.8rem;
                color: var(--muted);
            }
            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.3);
                accent-color: var(--red);
            }

            .gate-foot {
                margin: 20px 0 0;
                font-size: 0.68rem;
                letter-spacing: 0.16em;
                color: #c0ada4;
            }

            .hidden {
                display: none !important;
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] {
                    font-size: 16px;
                }
            }
        </style>
    </head>
